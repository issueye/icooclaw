# icooclaw 配置文件示例

workspace = "./workspace"

[database]
path = "./workspace/data/icooclaw.db"

[log]
level = "info"
format = "text"
output = "./logs/icooclaw.log"  # 日志输出文件路径，为空则只输出到控制台

# Agent 默认配置
[agents]
default_provider = ""  # 已废弃，Provider 现在通过数据库配置

[agents.defaults]
name = "icooclaw"
model = ""  # 默认模型，如果为空则使用 Provider 的默认模型
temperature = 0.7
max_tokens = 4096
memory_window = 10
system_prompt = "你是一个有用的 AI 助手。请用中文回答用户的问题。"

# WebSocket 通道配置
[channels.websocket]
enabled = false
host = "0.0.0.0"
port = 8080

# 工具配置
[tools]
enabled = true
allow_file_read = true
allow_file_write = true
allow_file_edit = true
allow_file_delete = true
allow_exec = false  # 默认关闭，以保证安全
exec_timeout = 30  # Shell 命令超时时间（秒）

# JavaScript 工具配置
[tools.js]
enabled = true                    # 是否启用 JS 工具
tools_dir = "tools"              # JS 工具目录（相对于 workspace）
max_memory = 10485760           # 最大内存（字节），默认 10MB
timeout = 30                     # 执行超时（秒）

# JS 工具默认权限
[tools.js.permissions]
file_read = true               # 允许读取文件
file_write = true              # 允许写入文件
file_delete = true             # 允许删除文件
network = true                 # 允许网络访问
exec = true                    # 允许执行命令
http_timeout = 30              # HTTP 请求超时（秒）
exec_timeout = 30              # 命令执行超时（秒）

# 记忆配置
[memory]
consolidation_threshold = 50    # 消息数达到此值时整合
summary_enabled = true          # 是否启用摘要
auto_save = false               # 是否自动保存
max_memory_age = 30            # 记忆最大保留天数

# 调度器配置
[scheduler]
enabled = false                 # 是否启用调度器
heartbeat_interval = 30        # 心跳间隔（分钟）

# MCP (Model Context Protocol) 配置
[mcp]
enabled = false                 # 是否启用 MCP

# ===== Provider 配置说明 =====
# Provider 配置已迁移到数据库中，通过以下方式配置：
# 1. 使用前端设置页面进行配置
# 2. 调用 API 进行配置：
#    - POST /api/v1/providers/create
#    - POST /api/v1/providers/update
#    - GET /api/v1/providers/all
#
# Provider 配置存储在 provider_configs 表中，包含以下字段：
# - name: Provider 名称 (openai, anthropic, deepseek 等)
# - base_url: API 基础地址
# - api_key: API 密钥
# - llms: 支持的 LLM 列表 (JSON 格式)
# - enabled: 是否启用
# - config: 额外配置 (JSON 格式)
